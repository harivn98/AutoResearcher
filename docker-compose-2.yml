api:
  build:
    context: .
    dockerfile: Dockerfile
  container_name: autoresearcher-api
  ports:
    - "8000:8000"
  env_file:
    - .env
  environment:
    OLLAMA_BASE_URL: "http://host.docker.internal:11434"
    CHROMA_PERSIST_DIR: "/app/chroma_db"
  volumes:
    - ./chroma_db:/app/chroma_db
  depends_on:
    langfuse-web:
      condition: service_started
